<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft GUI Builder Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <h1>GUI Builder <span>Pro</span></h1>
                <div class="menu-settings">
                    <input type="text" id="menu-title" placeholder="Menü Başlığı (Örn: &cSilahlar)" value="Sandık">
                    <select id="row-selector" title="Sandık Boyutu">
                        <option value="1">1 Satır (9 Slot)</option>
                        <option value="2">2 Satır (18 Slot)</option>
                        <option value="3" selected>3 Satır (27 Slot)</option>
                        <option value="4">4 Satır (36 Slot)</option>
                        <option value="5">5 Satır (45 Slot)</option>
                        <option value="6">6 Satır (54 Slot)</option>
                    </select>
                </div>
            </div>
            <button id="btn-generate-json" class="btn-primary">JSON Üret 🚀</button>
        </header>
        

        <main class="main-workspace">
            <aside class="properties-panel">
                <h3>Eşya Özellikleri</h3>
                <div id="empty-state" class="empty-state">Düzenlemek için sağdan bir eşya sürükleyin veya sandıktan seçin.</div>
                <div id="properties-form" class="properties-form" style="display: none;">
                    <div class="form-group">
                        <label>Eşya ID</label>
                        <input type="text" id="item-id" placeholder="Örn: diamond_sword" readonly>
                    </div>
                    <div class="form-group">
                        <label>Miktar (Amount)</label>
                        <input type="number" id="item-amount" placeholder="Örn: 64" min="1" max="64" value="1">
                    </div>
                    <div class="form-group">
                        <label>Görünen İsim</label>
                        <input type="text" id="item-name" placeholder="Örn: &cKanlı Kılıç">
                    </div>
                    <div class="form-group">
                        <label>Açıklama (Lore)</label>
                        <textarea id="item-lore" rows="5" placeholder="Örn: Efsanevi bir silahtır."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Action (Tıklanma)</label>
                        <input type="text" id="item-action" placeholder="Örn: [console] give %player% diamond_sword 1">
                    </div>
                </div>
            </aside>

            <section class="chest-stage">
                <div class="chest-wrapper">
                    <div id="inventory-grid" class="inventory-grid">
                        </div>
                </div>
            </section>

            <aside class="item-sidebar">
                <div class="sidebar-header">
                    <h3>Eşya Kütüphanesi</h3>
                    <input type="text" id="item-search" placeholder="Eşya ara...">
                </div>
                <div id="sidebar-item-grid" class="sidebar-grid">
                    </div>
            </aside>
        </main>

        <footer class="saved-items-area">
            <div class="saved-header">
                <h3>Kayıtlı Eşyalarım</h3>
                <small>Özel eşyalarınızı buraya sürükleyip saklayabilirsiniz.</small>
            </div>
            <div id="saved-items-grid" class="saved-grid">
                </div>
        </footer>
    </div>

    <div id="mc-tooltip" class="mc-tooltip" style="display: none;">
        <span id="mc-tooltip-name" class="mc-tooltip-name"></span>
        <div id="mc-tooltip-lore" class="mc-tooltip-lore"></div>
    </div>

    <div id="json-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content json-modal-content">
            <div class="modal-header">
                <h3>Üretilen JSON Kodu</h3>
                <button id="close-json-modal" class="btn-close">&times;</button>
            </div>
            <textarea id="json-output" readonly></textarea>
            <div class="modal-footer" style="display: flex; justify-content: space-between; align-items: center;">
                <label style="color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px;">
                    <input type="checkbox" id="toggle-compress-json"> 📦 Aynı Eşyaları Grupla (Örn: "0-8")
                </label>
                <button id="btn-copy-json" class="btn-primary">Panoya Kopyala 📋</button>
            </div>
        </div>
    </div>

    <script src="items.js"></script>
    <script src="script.js"></script>
</body>
</html>
