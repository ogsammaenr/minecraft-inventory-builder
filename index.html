<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft GUI Builder | Pro Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-wrapper">
        <header class="app-header">
            <h1>🛠️ GUI Builder <span>Pro</span></h1>
            <p>Minecraft envanter menülerinizi modern arayüzde tasarlayın.</p>
        </header>

        <div class="app-container">
            <div class="panel left-panel">
                <div class="panel-top">
                    <label for="menu-title">Menü Başlığı</label>
                    <input type="text" id="menu-title" class="menu-title-input" value="&8Ada Kontrol Paneli">
                </div>
                
                <div class="inventory-wrapper mc-ui-shadow">
                    <div class="inventory-grid" id="inventory-grid">
                        </div>
                </div>
            </div>

            <div class="panel right-panel">
                <div class="panel-header">
                    <h3>Eşya Özellikleri</h3>
                </div>
                
                <div id="properties-form" class="properties-form" style="display: none;">
                    <div class="form-group">
                        <label for="item-id">Eşya ID</label>
                        <div class="input-with-button">
                            <input type="text" id="item-id" placeholder="Örn: diamond_sword">
                            <button type="button" id="btn-browse-items" class="btn-icon" title="Eşya Seç">🔍</button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="item-name">Görünen İsim</label>
                        <input type="text" id="item-name" placeholder="&a&lAdaya Git">
                    </div>
                    
                    <div class="form-group">
                        <label for="item-lore">Lore / Açıklama</label>
                        <textarea id="item-lore" placeholder="&7Tıkla ve ışınlan..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="item-action">Action ID</label>
                        <input type="text" id="item-action" placeholder="TELEPORT_HOME">
                    </div>
                </div>

                <div id="empty-state" class="empty-state">
                    <div class="empty-icon">🖱️</div>
                    <p>Düzenlemek için soldaki sandıktan bir slota tıklayın.</p>
                </div>

                <div class="output-container">
                    <button class="btn-primary" id="btn-generate">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        JSON Üret
                    </button>
                    <textarea id="json-output" readonly placeholder="Çıktı burada görünecek..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <div id="mc-tooltip" class="mc-tooltip" style="display: none;">
        <div class="mc-tooltip-name" id="mc-tooltip-name"></div>
        <div class="mc-tooltip-lore" id="mc-tooltip-lore"></div>
    </div>

    <div id="item-picker-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Eşya Kataloğu</h3>
                <button id="close-modal" class="btn-close">&times;</button>
            </div>
            <div class="modal-search">
                <input type="text" id="item-search" placeholder="Eşya ara... (Örn: sword, bed, glass)">
            </div>
            <div class="modal-grid" id="modal-item-grid">
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script src="items.js"></script>
</body>
</html>
